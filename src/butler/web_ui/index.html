<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Butler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="qwebchannel.js"></script>
<style>
:root {
    --bg: transparent;
    --panel: rgba(10,14,24,0.94);
    --line: rgba(95,119,153,0.14);
    --line2: rgba(95,119,153,0.22);
    --text: #d5def0;
    --muted: #7f8ca7;
    --blue: #2d78d5;
    --blue2: #7fb4ff;
    --teal: #23b98d;
    --teal2: #78e3c2;
    --purple: #7f6ef0;
    --purple2: #b0a6ff;
    --red: #d85c5c;
    --red2: #ff8585;
    --amber: #f0b85f;
    --mono: 'Share Tech Mono', monospace;
    --head: 'Rajdhani', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
    width:100%;height:100%;overflow:hidden;
    background:transparent!important;
    font-family:var(--head);
    user-select:none;-webkit-user-select:none;
}

/* ═══ ORBITAL CONTAINER ═══ */
.orbital{
    position:absolute;
    right:80px; top:160px;
    width:0;height:0;
}

/* ═══ HUB BUTTON (I) ═══ */
.hub{
    position:absolute;
    left:-38px;top:-38px;
    width:76px;height:76px;
    border-radius:50%;
    cursor:pointer;
    z-index:20;
    transition:transform .13s,filter .18s;
}
.hub:active{transform:scale(.92)}
.hub:hover{filter:brightness(1.15)}
.hub svg{width:100%;height:100%}

.hub-ring{
    position:absolute;inset:-7px;border-radius:50%;
    border:1px solid rgba(127,110,240,.18);
    animation:hubSpin 4s linear infinite;
    pointer-events:none;
}
.hub-ring::before{
    content:'';position:absolute;top:-2px;left:50%;
    width:4px;height:4px;border-radius:50%;
    background:var(--purple2);transform:translateX(-50%);
}
@keyframes hubSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Hub recording state */
.hub.recording{filter:drop-shadow(0 0 16px rgba(127,110,240,.75))!important}
.hub.recording svg .mic-body{fill:#241d4f!important;stroke:var(--purple2)!important}
.hub.recording .hub-ring{border-color:rgba(176,166,255,.5);animation:hubSpin .6s linear infinite}

/* Hub live state */
.hub.st-live-mic{filter:drop-shadow(0 0 16px rgba(216,92,92,.65))!important}
.hub.st-live-mic svg .mic-body{fill:#451010!important;stroke:var(--red2)!important}
.hub.st-live-mic .hub-ring{border-color:rgba(255,133,133,.45);animation:hubSpin .7s linear infinite}
.hub.st-live-mic .hub-ring::before{background:var(--red2)}

/* ═══ SATELLITES ═══ */
.sat{
    position:absolute;
    left:-26px;top:-26px;
    width:52px;height:52px;
    border-radius:50%;
    cursor:pointer;
    opacity:0;
    transform:scale(0);
    pointer-events:none;
    z-index:15;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .2s;
}
.sat svg{width:100%;height:100%}
.sat:active{transform:scale(.88)!important}
.sat:hover{filter:brightness(1.2)}

/* Expanded positions — offsets from hub center */
.orbital.expanded .sat{opacity:1;pointer-events:auto}
.orbital.expanded .sat-ii{transform:translate(50px,-95px) scale(1);transition-delay:0s}
.orbital.expanded .sat-iii{transform:translate(-100px,-55px) scale(1);transition-delay:.04s}
.orbital.expanded .sat-iv{transform:translate(-80px,70px) scale(1);transition-delay:.08s}
.orbital.expanded .sat-v{transform:translate(-10px,115px) scale(1);transition-delay:.12s}

/* Satellite active states */
.sat.st-live svg .live-dot{animation:livePop .75s ease-in-out infinite alternate}
@keyframes livePop{from{r:4}to{r:7.5}}
.sat.st-wake svg .ring{stroke:var(--teal2)!important}
.sat.st-wake svg .core{fill:var(--teal)!important}
.sat.st-wake{filter:drop-shadow(0 0 8px rgba(35,185,141,.35))}
.sat.st-wake svg .pulse{animation:pRing 1.3s ease-out infinite}
@keyframes pRing{0%{r:12;opacity:.75}100%{r:32;opacity:0}}
.sat.st-text svg .tb-cursor{animation:cur .85s step-end infinite}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.sat.st-chat svg .chat-bg{fill:#0f241d!important;stroke:var(--teal2)!important}

/* ═══ CONNECTOR LINES ═══ */
.connectors{
    position:absolute;left:0;top:0;
    width:1px;height:1px;
    overflow:visible;
    z-index:5;
    pointer-events:none;
}
.conn-line{
    stroke:rgba(127,180,255,.12);
    stroke-width:1;
    opacity:0;
    transition:opacity .25s;
}
.orbital.expanded .conn-line{opacity:1}

/* ═══ WINDOW DOTS ═══ */
.dot{
    position:absolute;
    width:14px;height:14px;
    border-radius:50%;
    cursor:pointer;
    border:1px solid;
    z-index:20;
    transition:transform .12s,filter .15s,background .15s;
}
.dot:active{transform:scale(.82)}
.dot-kill{
    left:55px;top:-20px;
    border-color:rgba(216,92,92,.4);
    background:rgba(216,92,92,.18);
}
.dot-kill:hover{background:rgba(216,92,92,.35);filter:drop-shadow(0 0 5px rgba(216,92,92,.4))}
.dot-min{
    left:55px;top:5px;
    border-color:rgba(240,184,95,.4);
    background:rgba(240,184,95,.18);
}
.dot-min:hover{background:rgba(240,184,95,.35);filter:drop-shadow(0 0 5px rgba(240,184,95,.4))}

/* ═══ DRAG HANDLE ═══ */
.drag-grip{
    position:absolute;
    left:55px;top:30px;
    width:14px;height:12px;
    border-radius:3px;
    border:1px solid rgba(127,110,240,.3);
    background:rgba(127,110,240,.12);
    cursor:grab;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;
    z-index:20;
}
.drag-grip:active{cursor:grabbing}
.drag-grip span{display:block;width:8px;height:1px;background:rgba(176,166,255,.55);border-radius:1px}

/* ═══ TEXT BAR ═══ */
.text-bar{
    position:absolute;
    right:80px;top:300px;
    width:280px;
    max-height:0;overflow:hidden;opacity:0;
    background:linear-gradient(180deg,rgba(8,12,20,.96),rgba(5,8,14,.98));
    border:1px solid var(--line);
    border-radius:14px;
    transition:max-height .3s cubic-bezier(.4,0,.2,1),opacity .25s;
    z-index:10;
}
.text-bar.open{max-height:54px;opacity:1}
.text-inner{
    display:flex;align-items:center;
    padding:0 14px;height:52px;gap:8px;
}
.text-inner input{
    flex:1;background:transparent;border:none;
    border-bottom:1px solid rgba(127,180,255,.16);
    color:var(--text);font-family:var(--mono);font-size:12px;
    padding:4px 0;outline:none;letter-spacing:.5px;
    caret-color:var(--blue2);
}
.text-inner input::placeholder{color:var(--muted)}
.text-inner input:focus{border-bottom-color:rgba(127,180,255,.55)}
.send-btn{
    font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
    color:var(--blue2);
    background:rgba(45,120,213,.14);
    border:1px solid rgba(127,180,255,.22);
    border-radius:6px;padding:4px 10px;
    cursor:pointer;transition:background .15s,transform .12s;
}
.send-btn:hover{background:rgba(45,120,213,.22)}
.send-btn:active{transform:scale(.94)}

/* ═══ CHAT PANEL ═══ */
.chat-panel{
    position:absolute;
    right:180px;top:40px;
    width:0;min-height:360px;height:auto;
    overflow:hidden;
    display:flex;flex-direction:column;
    border-radius:16px;opacity:0;
    background:linear-gradient(180deg,rgba(9,13,23,.96),rgba(7,10,18,.98));
    border:1px solid var(--line);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.02),0 12px 28px rgba(0,0,0,.24);
    transition:width .36s cubic-bezier(.4,0,.2,1),opacity .3s;
    z-index:10;
}
.chat-panel.open{width:280px;opacity:1}
.chat-panel-header{
    font-family:var(--mono);font-size:9px;letter-spacing:3px;
    color:var(--blue2);font-weight:700;text-transform:uppercase;
    padding:11px 14px 9px;
    border-bottom:1px solid rgba(95,119,153,.12);
    flex-shrink:0;
}
.chat-list{
    flex:1;overflow-y:auto;
    display:flex;flex-direction:column;gap:6px;padding:8px;
}
.chat-list::-webkit-scrollbar,.chat-active-area::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb,.chat-active-area::-webkit-scrollbar-thumb{
    background:rgba(127,180,255,.16);border-radius:2px;
}
.convo-card{
    background:rgba(14,20,33,.68);
    border:1px solid rgba(95,119,153,.12);
    border-radius:10px;padding:8px 10px;
    cursor:pointer;
    transition:background .15s,border-color .15s,transform .12s;
    flex-shrink:0;
}
.convo-card:hover{background:rgba(20,32,54,.76);border-color:rgba(127,180,255,.18);transform:translateY(-1px)}
.convo-card.active{border-color:rgba(127,180,255,.26);background:rgba(20,36,62,.8)}
.convo-line{font-family:var(--mono);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.convo-line.boss-line{color:var(--blue2)}
.convo-line.butler-line{color:var(--teal2)}
.convo-line .lbl{color:var(--muted);margin-right:4px;font-size:9px}
.convo-ts{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.chat-active-area{
    border-top:1px solid rgba(95,119,153,.12);
    padding:8px 10px;flex-shrink:0;
    display:flex;flex-direction:column;gap:5px;
    max-height:170px;overflow-y:auto;
}
.msg-row{display:flex;flex-direction:column}
.msg-row.boss-row{align-items:flex-end}
.msg-row.butler-row{align-items:flex-start}
.msg-bubble{
    max-width:92%;padding:7px 10px;border-radius:11px;
    font-family:var(--head);font-size:12px;line-height:1.45;color:var(--text);
}
.msg-bubble.boss{background:rgba(19,44,82,.9);border:1px solid rgba(127,180,255,.16)}
.msg-bubble.butler{background:rgba(10,16,26,.95);border:1px solid rgba(95,119,153,.14)}
.msg-ts{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:2px;letter-spacing:1px}
</style>
</head>
<body>

<!-- ═══ ORBITAL CLUSTER ═══ -->
<div class="orbital" id="orbital">

    <!-- Connector SVG lines -->
    <svg class="connectors" viewBox="-200 -200 400 400">
        <line class="conn-line" x1="0" y1="0" x2="50" y2="-95"/>
        <line class="conn-line" x1="0" y1="0" x2="-100" y2="-55"/>
        <line class="conn-line" x1="0" y1="0" x2="-80" y2="70"/>
        <line class="conn-line" x1="0" y1="0" x2="-10" y2="115"/>
    </svg>

    <!-- HUB (I) — Mic / One-shot talk -->
    <div class="hub" id="hub-btn" onclick="handleHubClick(event)" oncontextmenu="toggleExpand(event)">
        <div class="hub-ring"></div>
        <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="37" fill="rgba(28,24,60,.72)" stroke="#7f6ef0" stroke-width="1.5"/>
            <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(127,110,240,.16)" stroke-width="1"/>
            <rect class="mic-body" x="33" y="19" width="14" height="25" rx="7" fill="#17132f" stroke="#b0a6ff" stroke-width="1.5"/>
            <path d="M27 43 Q27 55 40 55 Q53 55 53 43" fill="none" stroke="#7f6ef0" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="40" y1="55" x2="40" y2="61" stroke="#7f6ef0" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="34" y1="61" x2="46" y2="61" stroke="#7f6ef0" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- SAT II — Live Talk -->
    <div class="sat sat-ii" id="live-btn" onclick="toggleLive()">
        <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="33" fill="none" stroke="#d85c5c" stroke-width="1.5"/>
            <circle cx="40" cy="40" r="23" fill="none" stroke="rgba(216,92,92,.18)" stroke-width="1"/>
            <circle cx="40" cy="40" r="14" fill="none" stroke="rgba(216,92,92,.24)" stroke-width="1"/>
            <circle class="live-dot" cx="40" cy="40" r="4" fill="#d85c5c"/>
            <text x="40" y="70" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="7" fill="#7a3535" letter-spacing="2">LIVE</text>
        </svg>
    </div>

    <!-- SAT III — Text Input -->
    <div class="sat sat-iii" id="text-btn" onclick="toggleText()">
        <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="33" fill="none" stroke="#2d78d5" stroke-width="1.5"/>
            <rect x="21" y="33" width="38" height="14" rx="3" fill="none" stroke="#2d78d5" stroke-width="1.5"/>
            <line x1="26" y1="40" x2="41" y2="40" stroke="#7fb4ff" stroke-width="1.5" stroke-linecap="round"/>
            <line class="tb-cursor" x1="43" y1="36" x2="43" y2="44" stroke="#7fb4ff" stroke-width="1.5" stroke-linecap="round" opacity="0"/>
        </svg>
    </div>

    <!-- SAT IV — Wake Word -->
    <div class="sat sat-iv" id="wake-btn" onclick="toggleWake()">
        <svg viewBox="0 0 80 80">
            <circle class="ring" cx="40" cy="40" r="33" fill="none" stroke="#2d78d5" stroke-width="1.5"/>
            <circle cx="40" cy="40" r="22" fill="none" stroke="rgba(45,120,213,.16)" stroke-width="1"/>
            <circle class="pulse" cx="40" cy="40" r="12" fill="none" stroke="#78e3c2" stroke-width="1.2" opacity="0"/>
            <path d="M26 40 Q29 32 32 40 Q35 48 38 40 Q41 32 44 40 Q47 48 50 40 Q53 32 56 40" fill="none" stroke="#7fb4ff" stroke-width="1.6" stroke-linecap="round" opacity=".72"/>
            <circle class="core" cx="40" cy="40" r="4.5" fill="#2d78d5"/>
        </svg>
    </div>

    <!-- SAT V — Chat Panel -->
    <div class="sat sat-v" id="chat-btn" onclick="toggleChat()">
        <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="33" fill="none" stroke="#23b98d" stroke-width="1.5"/>
            <rect class="chat-bg" x="18" y="21" width="44" height="29" rx="4" fill="#081712" stroke="#78e3c2" stroke-width="1.5"/>
            <line x1="24" y1="30" x2="40" y2="30" stroke="#78e3c2" stroke-width="1.5" stroke-linecap="round" opacity=".88"/>
            <line x1="24" y1="36" x2="56" y2="36" stroke="#78e3c2" stroke-width="1" stroke-linecap="round" opacity=".48"/>
            <line x1="24" y1="42" x2="48" y2="42" stroke="#78e3c2" stroke-width="1" stroke-linecap="round" opacity=".28"/>
            <polygon points="28,50 35,50 31.5,57" fill="#23b98d"/>
        </svg>
    </div>

    <!-- Window dots -->
    <div class="dot dot-kill" onclick="doKill()" title="Kill"></div>
    <div class="dot dot-min" onclick="doMinimize()" title="Minimize"></div>
    <div class="drag-grip" id="drag-handle" onmousedown="startDrag(event)" title="Drag">
        <span></span><span></span>
    </div>
</div>

<!-- ═══ TEXT BAR ═══ -->
<div class="text-bar" id="text-bar">
    <div class="text-inner">
        <input type="text" id="cmd-input" placeholder="Awaiting command..." onkeydown="handleEnter(event)" autocomplete="off" spellcheck="false"/>
        <div class="send-btn" onclick="submitText()">SEND</div>
    </div>
</div>

<!-- ═══ CHAT PANEL ═══ -->
<div class="chat-panel" id="chat-panel">
    <div class="chat-panel-header">Chats</div>
    <div class="chat-list" id="chat-list"></div>
    <div class="chat-active-area" id="chat-active"></div>
</div>

<script>
const S = {wake:false,text:false,live:false,chat:false,recording:false,expanded:false};
const sessions = [];
let activeSession = null;
let api = null;
let pyQueue = [];

function py(method,...args){
    if(window.api&&window.api[method]){window.api[method](...args)}
    else{pyQueue.push({method,args})}
}

function fmtTime(){return new Date().toTimeString().slice(0,8)}
function setStatus(msg){}
function stopBubble(e){e.stopPropagation()}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'...':(s||'-')}

// ── DRAG ──
function startDrag(e){
    e.preventDefault();e.stopPropagation();
    py('start_drag');
}

// ── HUB CLICK ──
function handleHubClick(e){
    e.preventDefault();
    if(S.live){stopLive()}
    else{doOneShot()}
}

function toggleExpand(e){
    e.preventDefault();
    S.expanded=!S.expanded;
    document.getElementById('orbital').classList.toggle('expanded',S.expanded);
    py('on_expand_toggle',S.expanded);
    setTimeout(syncHitRegions,400);
}

// ── ONE-SHOT MIC ──
function doOneShot(){
    if(S.recording)return;
    S.recording=true;
    const hub=document.getElementById('hub-btn');
    hub.classList.add('recording');
    py('on_mic_click');
    setTimeout(()=>{
        if(!S.live){hub.classList.remove('recording');S.recording=false}
    },1500);
}

// ── LIVE TALK (II) ──
function toggleLive(){S.live?stopLive():startLive()}
function startLive(){
    S.live=true;S.recording=true;
    document.getElementById('hub-btn').classList.add('st-live-mic');
    document.getElementById('hub-btn').classList.remove('recording');
    document.getElementById('live-btn').classList.add('st-live');
    py('on_live_toggle',true);
}
function stopLive(){
    S.live=false;S.recording=false;
    document.getElementById('hub-btn').classList.remove('st-live-mic');
    document.getElementById('hub-btn').classList.remove('recording');
    document.getElementById('live-btn').classList.remove('st-live');
    py('on_live_toggle',false);
}

// ── TEXT INPUT (III) ──
function toggleText(){
    S.text=!S.text;
    document.getElementById('text-bar').classList.toggle('open',S.text);
    document.getElementById('text-btn').classList.toggle('st-text',S.text);
    if(S.text)setTimeout(()=>document.getElementById('cmd-input').focus(),310);
    py('on_text_toggle',S.text);
    setTimeout(syncHitRegions,350);
}

// ── WAKE WORD (IV) ──
function toggleWake(){
    S.wake=!S.wake;
    document.getElementById('wake-btn').classList.toggle('st-wake',S.wake);
    py('on_wake_toggle',S.wake);
}

// ── CHAT PANEL (V) ──
function toggleChat(){
    S.chat=!S.chat;
    document.getElementById('chat-panel').classList.toggle('open',S.chat);
    document.getElementById('chat-btn').classList.toggle('st-chat',S.chat);
    py('on_chat_toggle',S.chat);
    setTimeout(syncHitRegions,400);
}

function doMinimize(){py('minimize')}
function doKill(){py('kill')}
function handleEnter(e){if(e.key==='Enter')submitText()}

function submitText(){
    const inp=document.getElementById('cmd-input');
    const text=inp.value.trim();
    if(!text)return;
    inp.value='';
    window.appendLog('user',text);
    py('on_text_submit',text);
}

// ── SESSIONS ──
function newSession(){
    const sess={id:Date.now(),ts:fmtTime(),messages:[]};
    sessions.unshift(sess);activeSession=sess;return sess;
}
function selectSession(sess){activeSession=sess;renderChatList();renderActive()}

function renderChatList(){
    const list=document.getElementById('chat-list');list.innerHTML='';
    sessions.forEach(sess=>{
        const msgs=sess.messages;
        const bossMsg=[...msgs].reverse().find(m=>m.role==='user')||null;
        const butlerMsg=[...msgs].reverse().find(m=>m.role==='butler')||null;
        const card=document.createElement('div');
        card.className='convo-card'+(sess===activeSession?' active':'');
        card.onclick=()=>selectSession(sess);
        card.innerHTML=
            `<div class="convo-line boss-line"><span class="lbl">BOSS:</span>${trunc(bossMsg?bossMsg.text:'-',26)}</div>`+
            `<div class="convo-line butler-line"><span class="lbl">BUTLER:</span>${trunc(butlerMsg?butlerMsg.text:'-',24)}</div>`+
            `<div class="convo-ts">${sess.ts}</div>`;
        list.appendChild(card);
    });
}

function renderActive(){
    const area=document.getElementById('chat-active');area.innerHTML='';
    if(!activeSession)return;
    activeSession.messages.forEach(msg=>{
        const isUser=msg.role==='user';
        const row=document.createElement('div');
        row.className='msg-row '+(isUser?'boss-row':'butler-row');
        const bubble=document.createElement('div');
        bubble.className='msg-bubble '+(isUser?'boss':'butler');
        bubble.textContent=msg.text;
        const ts=document.createElement('div');
        ts.className='msg-ts';ts.textContent=msg.ts;
        row.appendChild(bubble);row.appendChild(ts);area.appendChild(row);
    });
    area.scrollTop=area.scrollHeight;
}

// ── PYTHON API ──
window.updateStatus=function(status){
    setStatus(status);
    if(!S.live){
        const hub=document.getElementById('hub-btn');
        const busy=['thinking','processing','generating','recording'].some(k=>status.toLowerCase().includes(k));
        const done=['online','ready','standby'].some(k=>status.toLowerCase().includes(k));
        hub.classList.toggle('recording',busy);
        if(done){hub.classList.remove('recording');S.recording=false}
    }
};

window.appendLog=function(role,text){
    if(!activeSession)newSession();
    activeSession.messages.push({role,text,ts:fmtTime()});
    renderChatList();renderActive();
};

// ── INIT ──
window.addEventListener('load',()=>{
    function initBridge(){
        if(typeof QWebChannel!=='undefined'&&typeof qt!=='undefined'&&qt.webChannelTransport){
            new QWebChannel(qt.webChannelTransport,function(channel){
                window.api=channel.objects.api;api=window.api;
                while(pyQueue.length>0){const cmd=pyQueue.shift();py(cmd.method,...cmd.args)}
                newSession();
            });
        }else{setTimeout(initBridge,100)}
    }
    initBridge();
});

// ── HIT REGION SYNC ──
function syncHitRegions(){
    const ids=['hub-btn','live-btn','text-btn','wake-btn','chat-btn',
               'dot-kill','dot-min','drag-handle','text-bar','chat-panel'];
    const rects=[];
    ids.forEach(id=>{
        const el=document.getElementById(id);
        if(!el)return;
        const r=el.getBoundingClientRect();
        if(r.width<1||r.height<1)return;
        // skip invisible satellites
        const style=window.getComputedStyle(el);
        if(parseFloat(style.opacity)<0.1)return;
        rects.push({x:Math.round(r.x),y:Math.round(r.y),w:Math.round(r.width),h:Math.round(r.height)});
    });
    py('sync_hit_regions',JSON.stringify(rects));
}

document.addEventListener('contextmenu',e=>{
    if(!e.target.closest('.hub'))e.preventDefault();
});

// Initial sync after layout settles
setTimeout(syncHitRegions,500);
</script>
