<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Butler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="qwebchannel.js"></script>
<style>
:root {
    --bg-0: rgba(4, 8, 18, .42);
    --bg-1: rgba(9, 17, 34, .82);
    --bg-2: rgba(13, 25, 47, .72);
    --line: rgba(155, 215, 255, .22);
    --line-hot: rgba(122, 236, 255, .58);
    --text: #e8f7ff;
    --muted: rgba(210, 235, 255, .62);
    --green: #2df58a;
    --orange: #ff9f2f;
    --purple: #d86cff;
    --blue: #25d9ff;
    --red: #ff3e5f;
    --yellow: #ffe45c;
    --mono: 'Share Tech Mono', Consolas, monospace;
    --head: 'Rajdhani', 'Segoe UI', sans-serif;
    --pad: clamp(10px, 2.2vw, 18px);
    --button: clamp(44px, 10.5vh, 66px);
    --icon: calc(var(--button) * .56);
    --utility: clamp(22px, 5.2vh, 30px);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent !important;
    color: var(--text);
    font-family: var(--head);
    user-select: none;
    -webkit-user-select: none;
}

button,
input {
    font: inherit;
}

button {
    border: 0;
    color: inherit;
    cursor: pointer;
}

.widget-root {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: stretch;
    padding: clamp(6px, 1.5vw, 12px);
}

.dock {
    position: relative;
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-columns: max-content max-content;
    align-items: center;
    gap: clamp(8px, 1.7vw, 18px);
    padding: var(--pad) clamp(42px, 8vw, 66px) var(--pad) clamp(38px, 7vw, 58px);
    border: 1px solid var(--line);
    border-radius: clamp(20px, 5vh, 34px);
    background:
        radial-gradient(circle at 82% 18%, rgba(37, 217, 255, .18), transparent 28%),
        radial-gradient(circle at 18% 82%, rgba(216, 108, 255, .14), transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-0) 45%, var(--bg-2));
    box-shadow:
        0 18px 42px rgba(0, 0, 0, .42),
        inset 0 1px 0 rgba(255, 255, 255, .11),
        inset 0 -1px 0 rgba(0, 0, 0, .28);
    backdrop-filter: blur(18px) saturate(1.18);
    overflow: hidden;
    justify-content: start;
}

body.has-focus-mode .dock {
    grid-template-columns: max-content max-content minmax(0, 1fr);
}

body:not(.has-focus-mode) .dock {
    padding-right: clamp(30px, 6vw, 48px);
}

.dock::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(rgba(122, 236, 255, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122, 236, 255, .045) 1px, transparent 1px);
    background-size: 22px 22px;
    mask-image: radial-gradient(circle at 64% 50%, black, transparent 76%);
    pointer-events: none;
}

.dock::after {
    content: "";
    position: absolute;
    inset: 1px;
    border-radius: inherit;
    border: 1px solid rgba(255, 255, 255, .055);
    pointer-events: none;
}

.utility-stack {
    position: absolute;
    left: clamp(9px, 2vw, 16px);
    top: 50%;
    z-index: 4;
    display: grid;
    gap: clamp(8px, 1.7vh, 13px);
    transform: translateY(-50%);
}

.utility {
    width: var(--utility);
    height: var(--utility);
    display: grid;
    place-items: center;
    border: 1px solid rgba(255, 255, 255, .18);
    border-radius: 999px;
    background: rgba(255, 255, 255, .08);
    box-shadow: 0 0 18px rgba(255, 255, 255, .08), inset 0 0 10px rgba(255, 255, 255, .08);
    transition: transform .14s ease, filter .18s ease, box-shadow .18s ease;
}

.utility:hover {
    filter: brightness(1.12);
    box-shadow: 0 0 20px currentColor;
}

.utility:active {
    transform: scale(.9);
}

.kill-btn {
    color: var(--red);
}

.kill-btn::before,
.kill-btn::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 2px;
    border-radius: 999px;
    background: currentColor;
}

.kill-btn::before {
    transform: rotate(45deg);
}

.kill-btn::after {
    transform: rotate(-45deg);
}

.min-btn {
    color: var(--yellow);
}

.min-btn::before {
    content: "";
    width: 12px;
    height: 2px;
    border-radius: 999px;
    background: currentColor;
}

.drag-handle {
    position: relative;
    z-index: 3;
    width: clamp(28px, 5vw, 42px);
    height: calc(var(--button) + 6px);
    display: grid;
    place-items: center;
    border: 1px solid rgba(122, 236, 255, .2);
    border-radius: 999px;
    background: rgba(6, 15, 30, .48);
    cursor: grab;
}

.drag-handle:active {
    cursor: grabbing;
}

.drag-handle span,
.drag-handle::before,
.drag-handle::after {
    content: "";
    width: 4px;
    height: 4px;
    border-radius: 999px;
    background: var(--line-hot);
    box-shadow: 0 0 10px var(--line-hot);
}

.drag-handle::before,
.drag-handle::after {
    position: absolute;
}

.drag-handle::before {
    transform: translateY(-12px);
}

.drag-handle::after {
    transform: translateY(12px);
}

.controls {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: clamp(6px, 1.45vw, 14px);
    min-width: 0;
    transition: gap .24s ease;
}

.control-btn {
    --accent: var(--blue);
    position: relative;
    width: var(--button);
    min-width: var(--button);
    max-width: var(--button);
    height: var(--button);
    flex: 0 0 var(--button);
    display: grid;
    place-items: center;
    border: 1px solid color-mix(in srgb, var(--accent) 54%, transparent);
    border-radius: 18px;
    background:
        radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--accent) 24%, transparent), transparent 52%),
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.035));
    box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 0 18px color-mix(in srgb, var(--accent) 18%, transparent);
    transition:
        transform .18s cubic-bezier(.2,.9,.2,1.25),
        width .24s ease,
        flex-basis .24s ease,
        min-width .24s ease,
        max-width .24s ease,
        padding .24s ease,
        opacity .18s ease,
        margin .24s ease,
        border-color .18s ease,
        box-shadow .2s ease,
        background .2s ease;
}

body.has-focus-mode .controls {
    gap: 0;
}

body.has-focus-mode .control-btn:not(.focus-btn) {
    width: 0;
    min-width: 0;
    max-width: 0;
    flex-basis: 0;
    margin: 0;
    padding: 0;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    overflow: hidden;
    color: transparent;
    border-width: 0;
}

body.has-focus-mode .control-btn:not(.focus-btn) svg,
body.has-focus-mode .control-btn:not(.focus-btn) .text-symbol {
    width: 0;
    opacity: 0;
    visibility: hidden;
}

.control-btn::before {
    content: "";
    position: absolute;
    inset: 7px;
    border-radius: 14px;
    border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
    pointer-events: none;
}

.control-btn:hover {
    transform: translateY(-2px);
    border-color: color-mix(in srgb, var(--accent) 80%, white 8%);
    box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 32%, transparent);
}

.control-btn:active {
    transform: scale(.94);
}

.control-btn svg {
    position: relative;
    z-index: 1;
    width: var(--icon);
    height: var(--icon);
    fill: none;
    stroke: var(--accent);
    stroke-width: 2.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 7px color-mix(in srgb, var(--accent) 60%, transparent));
}

.mic-btn { --accent: var(--green); }
.live-btn { --accent: var(--orange); }
.text-btn { --accent: var(--purple); }
.wake-btn { --accent: var(--blue); }

.control-btn.active,
.control-btn.listening {
    background:
        radial-gradient(circle at 50% 28%, color-mix(in srgb, var(--accent) 34%, transparent), transparent 58%),
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.05));
    border-color: color-mix(in srgb, var(--accent) 92%, white 8%);
    box-shadow:
        0 0 0 1px color-mix(in srgb, var(--accent) 28%, transparent) inset,
        0 0 18px color-mix(in srgb, var(--accent) 46%, transparent),
        0 0 38px color-mix(in srgb, var(--accent) 24%, transparent);
}

.text-symbol {
    position: relative;
    z-index: 1;
    color: var(--purple);
    font-family: var(--mono);
    font-size: calc(var(--button) * .48);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(216, 108, 255, .76);
}

.panel-wrap {
    position: relative;
    z-index: 2;
    display: none;
    min-width: 0;
    height: calc(var(--button) + 10px);
    opacity: 0;
    transform: translateX(-12px);
    pointer-events: none;
    transition: opacity .22s ease, transform .28s cubic-bezier(.2,.9,.2,1);
}

body.has-focus-mode .panel-wrap {
    display: block;
}

body.mode-wake .panel-wrap {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
}

body.mode-live .panel-wrap,
body.mode-text .panel-wrap,
body.mode-mic .panel-wrap {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
}

.mode-panel {
    position: absolute;
    inset: 0;
    min-width: 0;
    display: grid;
    grid-template-columns: minmax(74px, 1fr) max-content;
    align-items: center;
    gap: clamp(8px, 1.7vw, 16px);
    padding: 0 clamp(12px, 2vw, 20px);
    border: 1px solid color-mix(in srgb, var(--panel-accent) 38%, transparent);
    border-radius: 18px;
    background:
        linear-gradient(90deg, color-mix(in srgb, var(--panel-accent) 17%, transparent), rgba(8, 16, 32, .54)),
        rgba(4, 10, 22, .5);
    box-shadow: inset 0 0 24px rgba(255, 255, 255, .035), 0 0 26px color-mix(in srgb, var(--panel-accent) 16%, transparent);
    opacity: 0;
    transform: translateY(8px) scale(.98);
    transition: opacity .2s ease, transform .24s cubic-bezier(.2,.9,.2,1);
}

.live-panel,
.mic-panel {
    --panel-accent: var(--orange);
}

.mic-panel {
    --panel-accent: var(--green);
}

.text-panel {
    --panel-accent: var(--purple);
    grid-template-columns: minmax(0, 1fr) max-content;
}

.wake-panel {
    --panel-accent: var(--blue);
}

.wake-panel {
    grid-template-columns: minmax(0, 1fr);
}

body.mode-live .live-panel,
body.mode-text .text-panel,
body.mode-mic .mic-panel,
body.mode-wake .wake-panel {
    opacity: 1;
    transform: translateY(0) scale(1);
}

.wave {
    min-width: 0;
    height: calc(var(--button) * .62);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(2px, .6vw, 5px);
    overflow: hidden;
}

.wave span {
    width: clamp(2px, .48vw, 4px);
    height: 34%;
    flex: 0 0 auto;
    border-radius: 999px;
    background: var(--panel-accent);
    box-shadow: 0 0 10px var(--panel-accent);
    animation: wavePulse 820ms ease-in-out infinite;
}

.wave span:nth-child(2n) { animation-delay: -110ms; }
.wave span:nth-child(3n) { animation-delay: -260ms; }
.wave span:nth-child(4n) { animation-delay: -410ms; }

.status-chip {
    min-width: clamp(46px, 8vw, 92px);
    color: var(--text);
    font-family: var(--mono);
    font-size: clamp(10px, 2.3vh, 14px);
    letter-spacing: .14em;
    text-align: right;
    text-transform: uppercase;
    text-shadow: 0 0 10px var(--panel-accent);
}

.wake-static {
    display: grid;
    gap: 4px;
    min-width: 0;
}

.wake-title {
    color: var(--text);
    font-family: var(--mono);
    font-size: clamp(12px, 2.8vh, 18px);
    letter-spacing: .18em;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(37, 217, 255, .72);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.wake-subtitle {
    color: var(--muted);
    font-family: var(--mono);
    font-size: clamp(8px, 1.8vh, 11px);
    letter-spacing: .14em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.text-field {
    min-width: 0;
    width: 100%;
    color: var(--text);
    background: transparent;
    border: 0;
    border-bottom: 1px solid color-mix(in srgb, var(--purple) 58%, transparent);
    outline: none;
    font-family: var(--mono);
    font-size: clamp(13px, 3.5vh, 22px);
    letter-spacing: .04em;
    padding: 0 0 7px;
    caret-color: var(--purple);
    text-shadow: 0 0 8px rgba(216, 108, 255, .38);
}

.text-field::placeholder {
    color: rgba(232, 247, 255, .48);
}

.send-btn {
    width: clamp(34px, 7vh, 46px);
    height: clamp(34px, 7vh, 46px);
    display: grid;
    place-items: center;
    border: 1px solid color-mix(in srgb, var(--purple) 55%, transparent);
    border-radius: 13px;
    background: rgba(216, 108, 255, .12);
    color: var(--purple);
    font-family: var(--mono);
    font-size: clamp(13px, 2.8vh, 18px);
    box-shadow: 0 0 18px rgba(216, 108, 255, .18);
    transition: transform .14s ease, background .18s ease, box-shadow .18s ease;
}

.send-btn:hover {
    background: rgba(216, 108, 255, .2);
    box-shadow: 0 0 28px rgba(216, 108, 255, .34);
}

.send-btn:active {
    transform: scale(.92);
}

.wake-status {
    position: absolute;
    right: clamp(42px, 8vw, 66px);
    bottom: clamp(7px, 1.3vh, 12px);
    z-index: 4;
    color: var(--blue);
    font-family: var(--mono);
    font-size: clamp(8px, 1.8vh, 11px);
    letter-spacing: .18em;
    text-shadow: 0 0 10px rgba(37, 217, 255, .72);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .2s ease, transform .2s ease;
}

body.wake-on .wake-status {
    opacity: 1;
    transform: translateY(0);
}

.resize-grip {
    position: absolute;
    right: 0;
    bottom: 0;
    z-index: 5;
    width: 34px;
    height: 34px;
    cursor: nwse-resize;
    pointer-events: none;
}

.resize-grip::before {
    content: "";
    position: absolute;
    right: 8px;
    bottom: 8px;
    width: 19px;
    height: 19px;
    background:
        linear-gradient(135deg, transparent 53%, rgba(122, 236, 255, .75) 54%, rgba(122, 236, 255, .75) 60%, transparent 61%),
        linear-gradient(135deg, transparent 34%, rgba(122, 236, 255, .48) 35%, rgba(122, 236, 255, .48) 41%, transparent 42%),
        linear-gradient(135deg, transparent 16%, rgba(122, 236, 255, .28) 17%, rgba(122, 236, 255, .28) 23%, transparent 24%);
    filter: drop-shadow(0 0 7px rgba(122, 236, 255, .7));
}

@keyframes wavePulse {
    0%, 100% { height: 28%; opacity: .65; }
    35% { height: 92%; opacity: 1; }
    62% { height: 46%; opacity: .8; }
}

@media (max-width: 520px) {
    .dock {
        gap: 7px;
        padding-left: 36px;
        padding-right: 38px;
    }

    .status-chip {
        display: none;
    }

    .mode-panel {
        grid-template-columns: minmax(0, 1fr);
        padding-inline: 10px;
    }
}

@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
    }
}
</style>
</head>
<body>
<main class="widget-root" aria-label="Butler control widget">
    <section class="dock" id="dock">
        <div class="utility-stack">
            <button class="utility kill-btn" id="kill-btn" type="button" onclick="doKill()" title="Kill" aria-label="Kill"></button>
            <button class="utility min-btn" id="min-btn" type="button" onclick="doMinimize()" title="Minimize" aria-label="Minimize"></button>
        </div>

        <button class="drag-handle" id="drag-handle" type="button" onmousedown="startDrag(event)" title="Drag" aria-label="Drag widget">
            <span></span>
        </button>

        <div class="controls" aria-label="Butler modes">
            <button class="control-btn mic-btn" id="mic-btn" type="button" onclick="doOneShot()" title="One-shot mic" aria-label="One-shot mic">
                <svg viewBox="0 0 64 64" aria-hidden="true">
                    <path d="M32 39c6 0 10-4 10-10V17c0-6-4-10-10-10S22 11 22 17v12c0 6 4 10 10 10Z"></path>
                    <path d="M15 29c0 10 7 18 17 18s17-8 17-18"></path>
                    <path d="M32 47v9"></path>
                    <path d="M22 56h20"></path>
                </svg>
            </button>

            <button class="control-btn live-btn" id="live-btn" type="button" onclick="toggleLive()" title="Live talkback" aria-label="Live talkback">
                <svg viewBox="0 0 64 64" aria-hidden="true">
                    <path d="M8 34v-4"></path>
                    <path d="M15 43V21"></path>
                    <path d="M22 51V13"></path>
                    <path d="M29 41V23"></path>
                    <path d="M36 49V15"></path>
                    <path d="M43 40V24"></path>
                    <path d="M50 45V19"></path>
                    <path d="M57 35v-6"></path>
                </svg>
            </button>

            <button class="control-btn text-btn" id="text-btn" type="button" onclick="toggleText()" title="Text input" aria-label="Text input">
                <span class="text-symbol" aria-hidden="true">T</span>
            </button>

            <button class="control-btn wake-btn" id="wake-btn" type="button" onclick="toggleWake()" title="Wake word" aria-label="Wake word">
                <svg viewBox="0 0 64 64" aria-hidden="true">
                    <path d="M23 49c-5-6-7-14-5-22 2-10 9-17 19-17 8 0 15 6 15 15 0 7-4 12-10 15-5 3-7 5-7 9 0 4-3 7-7 7-2 0-4-1-5-2"></path>
                    <path d="M30 28c2-4 7-5 10-2 4 4 1 9-5 12"></path>
                    <path d="M15 17c-4 6-5 15-1 23"></path>
                    <path d="M8 13c-6 10-6 22 0 33"></path>
                    <path d="M43 14c3 2 5 6 5 10"></path>
                </svg>
            </button>
        </div>

        <div class="panel-wrap" id="panel-wrap" aria-live="polite">
            <div class="mode-panel live-panel" aria-hidden="true">
                <div class="wave" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
                <div class="status-chip">Live</div>
            </div>

            <div class="mode-panel mic-panel" aria-hidden="true">
                <div class="wave" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
                <div class="status-chip">Once</div>
            </div>

            <div class="mode-panel text-panel" aria-hidden="true">
                <input class="text-field" id="cmd-input" type="text" placeholder="Enter command" onkeydown="handleEnter(event)" autocomplete="off" spellcheck="false" aria-label="Text command">
                <button class="send-btn" type="button" onclick="submitText()" title="Send" aria-label="Send text">></button>
            </div>

            <div class="mode-panel wake-panel" aria-hidden="true">
                <div class="wake-static">
                    <div class="wake-title">Wake Word Active</div>
                    <div class="wake-subtitle">Passive listener armed</div>
                </div>
            </div>
        </div>

        <div class="wake-status" id="wake-status">WAKE ONLINE</div>
        <div class="resize-grip" id="resize-grip" aria-hidden="true"></div>
    </section>
</main>

<script>
const S = { wake: false, text: false, live: false, recording: false };
const sessions = [];
let activeSession = null;
let pyQueue = [];
let micTimer = null;

function py(method, ...args) {
    if (window.api && window.api[method]) {
        window.api[method](...args);
        return;
    }
    pyQueue.push({ method, args });
}

function domRectFor(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    return {
        x: rect.left,
        y: rect.top,
        w: rect.width,
        h: rect.height,
    };
}

function syncHitRegions() {
    const regions = {
        dock: domRectFor('dock'),
        drag: domRectFor('drag-handle'),
        resize: domRectFor('resize-grip'),
    };
    py('update_hit_regions', JSON.stringify(regions));
}

function scheduleHitRegionSync() {
    requestAnimationFrame(() => {
        syncHitRegions();
        setTimeout(syncHitRegions, 260);
    });
}

function setMode(mode) {
    document.body.classList.toggle('mode-live', mode === 'live');
    document.body.classList.toggle('mode-text', mode === 'text');
    document.body.classList.toggle('mode-mic', mode === 'mic');
    document.body.classList.toggle('mode-wake', mode === 'wake');
    document.body.classList.toggle('has-focus-mode', Boolean(mode));
    document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('focus-btn'));
    const focusMap = {
        live: 'live-btn',
        text: 'text-btn',
        mic: 'mic-btn',
        wake: 'wake-btn',
    };
    const focusId = focusMap[mode];
    if (focusId) document.getElementById(focusId).classList.add('focus-btn');
    scheduleHitRegionSync();
}

function startDrag(e) {
    e.preventDefault();
    e.stopPropagation();
    py('start_drag');
}

function doOneShot() {
    if (S.live) stopLive();
    if (S.recording) return;
    closeText(true);

    S.recording = true;
    const mic = document.getElementById('mic-btn');
    mic.classList.add('listening');
    setMode('mic');
    py('on_mic_click');

    clearTimeout(micTimer);
    micTimer = setTimeout(() => {
        S.recording = false;
        mic.classList.remove('listening');
        if (!S.live && !S.text) setMode(S.wake ? 'wake' : '');
    }, 1600);
}

function toggleLive() {
    S.live ? stopLive() : startLive();
}

function startLive() {
    closeText(true);
    S.live = true;
    S.recording = true;
    document.getElementById('live-btn').classList.add('active');
    document.getElementById('mic-btn').classList.remove('listening');
    setMode('live');
    py('on_live_toggle', true);
}

function stopLive() {
    S.live = false;
    S.recording = false;
    document.getElementById('live-btn').classList.remove('active');
    setMode(S.text ? 'text' : (S.wake ? 'wake' : ''));
    py('on_live_toggle', false);
}

function toggleText() {
    S.text ? closeText(true) : openText();
}

function openText() {
    if (S.live) stopLive();
    S.text = true;
    document.getElementById('text-btn').classList.add('active');
    setMode('text');
    py('on_text_toggle', true);
    setTimeout(() => document.getElementById('cmd-input').focus(), 240);
}

function closeText(notify) {
    if (!S.text) return;
    S.text = false;
    document.getElementById('text-btn').classList.remove('active');
    setMode(S.live ? 'live' : (S.wake ? 'wake' : ''));
    if (notify) py('on_text_toggle', false);
}

function toggleWake() {
    S.wake = !S.wake;
    document.body.classList.toggle('wake-on', S.wake);
    document.getElementById('wake-btn').classList.toggle('active', S.wake);
    setMode(S.wake ? 'wake' : '');
    py('on_wake_toggle', S.wake);
}

function doMinimize() {
    py('minimize');
}

function doKill() {
    py('kill');
}

function handleEnter(e) {
    if (e.key === 'Enter') submitText();
}

function submitText() {
    const input = document.getElementById('cmd-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    window.appendLog('user', text);
    py('on_text_submit', text);
}

function fmtTime() {
    return new Date().toTimeString().slice(0, 8);
}

function newSession() {
    const sess = { id: Date.now(), ts: fmtTime(), messages: [] };
    sessions.unshift(sess);
    activeSession = sess;
    return sess;
}

window.updateStatus = function(status) {
    const msg = String(status || '').toLowerCase();
    const busy = ['thinking', 'processing', 'generating', 'recording', 'listening'].some(k => msg.includes(k));
    const done = ['online', 'ready', 'standby', 'done'].some(k => msg.includes(k));
    const mic = document.getElementById('mic-btn');

    if (!S.live && busy) {
        S.recording = true;
        mic.classList.add('listening');
        setMode('mic');
    }

    if (!S.live && done) {
        S.recording = false;
        mic.classList.remove('listening');
        if (!S.text) setMode(S.wake ? 'wake' : '');
    }
};

window.appendLog = function(role, text) {
    if (!activeSession) newSession();
    activeSession.messages.push({ role, text, ts: fmtTime() });
};

window.addEventListener('load', () => {
    function initBridge() {
        if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined' && qt.webChannelTransport) {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                window.api = channel.objects.api;
                while (pyQueue.length > 0) {
                    const cmd = pyQueue.shift();
                    py(cmd.method, ...cmd.args);
                }
                newSession();
                scheduleHitRegionSync();
            });
            return;
        }
        setTimeout(initBridge, 100);
    }
    initBridge();
});

window.addEventListener('resize', scheduleHitRegionSync);
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
